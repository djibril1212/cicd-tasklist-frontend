# --- Identification du projet ---
sonar.projectKey=tasklist-frontend
sonar.projectName=tasklist-frontend
sonar.projectVersion=1.0.0

# --- Serveur SonarQube local (Docker) ---
sonar.host.url=http://localhost:9000

# --- Sources & tests ---
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*

# --- Exclusions de l'analyse ---
sonar.exclusions=node_modules/**,dist/**,coverage/**,reports/**,public/**,**/*.css

# --- Exclusions de la couverture ---
sonar.coverage.exclusions=src/main.tsx,**/vite-env.d.ts,**/*.config.ts

# --- Rapport de couverture (LCOV généré par vitest/v8) ---
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Encodage ---
sonar.sourceEncoding=UTF-8
